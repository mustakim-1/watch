<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shopping Cart | Dialcraft Watches</title>
  <meta name="description" content="Review your selected luxury watches and proceed to checkout." />
  <link rel="icon" href="favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    /* General Styles */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #0d0d0d;
      color: #f5f5f5;
      font-family: 'Lato', sans-serif;
      padding-top: 90px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    /* Header/Navbar */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #d4af37;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      position: relative;
      width: 140px;
      height: 60px;
    }

    .logo img {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      height: 200px;
      width: auto;
      object-fit: contain;
      max-width: none;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .logo {
        width: 100px;
        height: 50px;
      }
      .logo img {
        height: 140px;
      }
    }

    .nav-menu {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-menu a {
      position: relative;
      font-weight: 600;
      font-size: 1rem;
      color: #d4af37;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .nav-menu a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #d4af37;
      transition: width 0.3s ease-in-out;
    }

    .nav-menu a:hover {
      color: #fff;
    }

    .nav-menu a:hover::after {
      width: 100%;
    }

    .cart-icon {
      position: relative;
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #d4af37;
      color: #0d0d0d;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* Cart Container */
    .cart-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .cart-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .cart-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.5rem;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .cart-subtitle {
      font-size: 1.1rem;
      color: #ccc;
    }

    /* Cart Content */
    .cart-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 40px;
    }

    /* Cart Items */
    .cart-items {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid #333;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .item-details {
      flex: 1;
    }

    .item-title {
      font-size: 1.2rem;
      color: #d4af37;
      margin-bottom: 8px;
    }

    .item-desc {
      color: #ccc;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .item-price {
      font-weight: 700;
      color: #d4af37;
      font-size: 1.1rem;
    }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quantity-btn {
      width: 30px;
      height: 30px;
      background: #2a2a2a;
      border: 1px solid #d4af37;
      color: #d4af37;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .quantity-btn:hover {
      background: #d4af37;
      color: #0d0d0d;
    }

    .quantity-display {
      font-size: 1.1rem;
      font-weight: 700;
      color: #d4af37;
      min-width: 25px;
      text-align: center;
    }

    .remove-btn {
      background: transparent;
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .remove-btn:hover {
      background: #ff4d4d;
      color: #fff;
    }

    /* Empty Cart */
    .empty-cart {
      text-align: center;
      padding: 80px 20px;
      color: #ccc;
    }

    .empty-cart i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-cart h3 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #d4af37;
    }

    .empty-cart p {
      margin-bottom: 30px;
    }

    .shop-btn {
      background: linear-gradient(45deg, #d4af37, #b8860b);
      color: #0d0d0d;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      transition: all 0.3s ease;
    }

    .shop-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
      transform: translateY(-2px);
    }

    /* Cart Summary */
    .cart-summary {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      height: fit-content;
      position: sticky;
      top: 120px;
    }

    .summary-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.8rem;
      color: #d4af37;
      margin-bottom: 25px;
      text-align: center;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: #ccc;
    }

    .summary-row.total {
      border-top: 1px solid #333;
      padding-top: 15px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #d4af37;
    }

    .checkout-btn {
      width: 100%;
      background: linear-gradient(45deg, #d4af37, #b8860b);
      color: #0d0d0d;
      padding: 18px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .checkout-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
      transform: translateY(-2px);
    }

    .continue-shopping {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #d4af37;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .continue-shopping:hover {
      color: #fff;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .cart-content {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .cart-summary {
        position: static;
      }

      .cart-item {
        flex-direction: column;
        gap: 15px;
      }

      .item-controls {
        justify-content: space-between;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cart-container {
      animation: fadeIn 0.8s ease-out;
    }

    .cart-item {
      animation: fadeIn 0.6s ease-out;
    }

    /* Wishlist Modal Styles */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 2000;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
        backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .quick-view-content {
        background: #111;
        border: 1px solid #d4af37;
        width: 90%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 10px;
        position: relative;
        padding: 40px;
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
    }

    .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        background: none;
        border: none;
        color: #888;
        font-size: 2rem;
        cursor: pointer;
        transition: color 0.3s;
        z-index: 10;
    }

    .close-modal:hover { color: #fff; }

    /* Wishlist Item Styles */
    .wishlist-item {
        display: flex;
        gap: 15px;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px;
        border-radius: 8px;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: background 0.3s;
    }
    .wishlist-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .wishlist-item img {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 4px;
    }
    .wishlist-item-info {
        flex: 1;
    }
    .wishlist-item-title {
        color: #fff;
        font-size: 0.9rem;
        margin-bottom: 5px;
        font-family: 'Cinzel Decorative', serif;
    }
    .wishlist-item-price {
        color: #d4af37;
        font-weight: bold;
    }
    .wishlist-remove-btn {
        background: transparent;
        border: none;
        color: #ff4d4d;
        cursor: pointer;
        font-size: 1.1rem;
        transition: transform 0.2s;
    }
    .wishlist-remove-btn:hover {
        transform: scale(1.1);
    }
  </style>

    <style>
        /* Global Font Override */
        h1, h2, h3, h4, h5, h6, .feature-title, .watch-title, .section-title, .special-title {
            font-family: 'Cinzel Decorative', serif !important;
        }
        body, p, span, a, li, div {
            font-family: 'Lato', sans-serif;
        }
    </style>
</head>

<body>
  <header id="main-header">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Dialcraft Watches">
    </a>
    <nav class="nav-menu">
      <a href="index.html">Home</a>
      <a href="all-watches.html">Collection</a>
      <a href="about.html">About</a>
      <a href="support.html">Support</a>
      <a href="account.html">Account</a>
      <a href="admin.html" style="color: #ff4d4d;">Admin</a>
      <div class="cart-icon" onclick="openWishlistModal()" style="margin-right: 20px;">
        <i class="fas fa-heart"></i>
        <span class="cart-count" id="wishlist-count">0</span>
      </div>
      <div class="cart-icon" onclick="window.location.href='cart.html'">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cart-count">0</span>
      </div>
    </nav>
  </header>

  <div class="cart-container">
    <div class="cart-header">
      <h1 class="cart-title">Shopping Cart</h1>
      <p class="cart-subtitle">Review your selected luxury timepieces</p>
    </div>

    <div class="cart-content">
      <div class="cart-items" id="cart-items">
        <!-- Cart items will be populated by JavaScript -->
      </div>

      <div class="cart-summary" id="cart-summary">
        <!-- Cart summary will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Wishlist Modal -->
  <div id="wishlist-modal" class="modal-overlay">
      <div class="quick-view-content">
          <button class="close-modal" onclick="closeWishlistModal()">&times;</button>
          <h2 style="color: #d4af37; font-family: 'Cinzel Decorative', serif; text-align: center; margin-bottom: 20px;">Your Wishlist</h2>
          <div id="wishlist-items" style="display: flex; flex-direction: column; gap: 15px; max-height: 60vh; overflow-y: auto;">
              <!-- Items injected here -->
          </div>
      </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      updateCartCount();
      updateWishlistCount();
    });

    // Wishlist Logic
    function getWishlist() {
        return JSON.parse(localStorage.getItem('dialcraft_wishlist')) || [];
    }

    function saveWishlist(wishlist) {
        localStorage.setItem('dialcraft_wishlist', JSON.stringify(wishlist));
        updateWishlistCount();
        
        // Dispatch event for other tabs/components
        window.dispatchEvent(new Event('storage'));
    }

    function toggleWishlist(title) {
        let wishlist = getWishlist();
        const index = wishlist.findIndex(item => item.title === title);
        
        // Since we only use this for removal in cart page, we don't strictly need the full add logic,
        // but we'll include it for completeness if we ever add 'Move to Wishlist' from cart
        
        if (index > -1) {
            wishlist.splice(index, 1);
        } else {
            // If we needed to add, we'd need access to the product object.
            // For now, in cart page, we primarily remove from modal.
            // If adding from cart items, we'd need to find the item in cart or product list.
            const products = JSON.parse(localStorage.getItem('dialcraft_products')) || [];
            const product = products.find(p => p.title === title);
            if (product) {
                 wishlist.push(product);
            }
        }
        saveWishlist(wishlist);
        
        // If modal is open, update it
        if (document.getElementById('wishlist-modal').classList.contains('active')) {
            renderWishlistItems();
        }
    }

    function updateWishlistCount() {
        const count = getWishlist().length;
        const badge = document.getElementById('wishlist-count');
        if (badge) {
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';
        }
    }

    function openWishlistModal() {
        renderWishlistItems();
        document.getElementById('wishlist-modal').classList.add('active');
    }

    function closeWishlistModal() {
        document.getElementById('wishlist-modal').classList.remove('active');
    }

    function renderWishlistItems() {
        const wishlist = getWishlist();
        const container = document.getElementById('wishlist-items');
        
        // We need watchDataList for finding IDs if we want to link to product page.
        // In cart.html we might not have watchDataList loaded. 
        // We can try to load from localStorage products or just use index 0 as fallback or omit link if ID missing.
        let products = JSON.parse(localStorage.getItem('dialcraft_products')) || [];
        
        if (wishlist.length === 0) {
            container.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">Your wishlist is empty.</p>';
            return;
        }

        container.innerHTML = wishlist.map(item => `
            <div class="wishlist-item" onclick="window.location.href='product.html?id=${item.id}'">
                <img src="${item.img}" alt="${item.title}">
                <div class="wishlist-item-info">
                    <div class="wishlist-item-title">${item.title}</div>
                    <div class="wishlist-item-price">${item.price}</div>
                </div>
                <button class="wishlist-remove-btn" onclick="event.stopPropagation(); toggleWishlist('${item.title.replace(/'/g, "\\'")}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');
    }
    
    // Close wishlist modal on outside click
    window.addEventListener('click', function(event) {
        const modal = document.getElementById('wishlist-modal');
        if (event.target == modal) {
            closeWishlistModal();
        }
    });

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('dialcraft_cart')) || [];

      if (cart.length === 0) {
        displayEmptyCart();
      } else {
        displayCartItems(cart);
        displayCartSummary(cart);
      }
    }

    function displayEmptyCart() {
      const cartItems = document.getElementById('cart-items');
      cartItems.innerHTML = `
        <div class="empty-cart">
          <i class="fas fa-shopping-cart"></i>
          <h3>Your cart is empty</h3>
          <p>Add some luxury watches to get started</p>
          <button class="shop-btn" onclick="window.location.href='index.html'">Start Shopping</button>
        </div>
      `;

      document.getElementById('cart-summary').style.display = 'none';
    }

    function displayCartItems(cart) {
      const cartItems = document.getElementById('cart-items');
      cartItems.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <img src="${item.img || item.image}" alt="${item.title}" class="item-image" />
          <div class="item-details">
            <h3 class="item-title">${item.title}</h3>
            <p class="item-desc">${item.desc || item.description}</p>
            <p class="item-price">${item.price}</p>
          </div>
          <div class="item-controls">
            <div class="quantity-controls">
              <button class="quantity-btn" onclick="changeQuantity(${index}, -1)">-</button>
              <span class="quantity-display">${item.quantity || 1}</span>
              <button class="quantity-btn" onclick="changeQuantity(${index}, 1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function displayCartSummary(cart) {
      const summary = document.getElementById('cart-summary');
      const subtotal = calculateTotal(cart);
      const shipping = subtotal > 5000 ? 0 : 200; // Free shipping over ৳5000
      const total = subtotal + shipping;

      summary.innerHTML = `
        <h3 class="summary-title">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal (${cart.reduce((sum, item) => sum + (item.quantity || 1), 0)} items)</span>
          <span>৳${subtotal.toLocaleString()}</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>${shipping === 0 ? 'Free' : '৳' + shipping}</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>৳${total.toLocaleString()}</span>
        </div>
        
        <!-- Lucky Spin Trigger -->
        <button class="shop-btn" style="width:100%; margin-top:15px; background:linear-gradient(45deg, #1a1a1a, #333); border:1px solid #d4af37;" onclick="openLuckySpin()">
            <i class="fas fa-gift" style="margin-right:8px;"></i> Spin for Discount
        </button>

        <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
        <a href="index.html" class="continue-shopping">Continue Shopping</a>
      `;
    }

    function calculateTotal(cart) {
      return cart.reduce((total, item) => {
        const price = parseInt(item.price.replace('৳', '').replace(',', ''));
        const quantity = item.quantity || 1;
        return total + (price * quantity);
      }, 0);
    }

    function changeQuantity(index, delta) {
      const cart = JSON.parse(localStorage.getItem('dialcraft_cart')) || [];
      const item = cart[index];

      // Validate stock if increasing quantity
      if (delta > 0) {
        const products = JSON.parse(localStorage.getItem('dialcraft_products')) || [];
        const product = products.find(p => p.title === item.title);
        const currentStock = (product && typeof product.stock !== 'undefined') ? product.stock : 10;

        if ((item.quantity || 1) + delta > currentStock) {
          alert(`Sorry, we only have ${currentStock} in stock!`);
          return;
        }
      }

      cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + delta);
      localStorage.setItem('dialcraft_cart', JSON.stringify(cart));
      loadCart();
    }

    function removeItem(index) {
      const cart = JSON.parse(localStorage.getItem('dialcraft_cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('dialcraft_cart', JSON.stringify(cart));
      loadCart();
    }

    function proceedToCheckout() {
      window.location.href = 'checkout.html';
    }
  </script>
  <script src="lucky-spin.js"></script>
</body>

</html>
