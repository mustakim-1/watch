<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout | Dialcraft Watches</title>
  <meta name="description" content="Complete your purchase of luxury anime-themed watches." />
  <link rel="icon" href="favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    /* General Styles */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #0d0d0d;
      color: #f5f5f5;
      font-family: "Poppins", sans-serif;
      padding-top: 90px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      font-family: inherit;
    }

    /* Header/Navbar */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-family: "Playfair Display", serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #d4af37;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      position: relative;
      width: 140px;
      height: 60px;
    }

    .logo img {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      height: 200px;
      width: auto;
      object-fit: contain;
      max-width: none;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .logo {
        width: 100px;
        height: 50px;
      }
      .logo img {
        height: 140px;
      }
    }

    .nav-menu {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .nav-menu a {
      position: relative;
      font-weight: 600;
      font-size: 1rem;
      color: #d4af37;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .nav-menu a::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #d4af37;
      transition: width 0.3s ease-in-out;
    }

    .nav-menu a:hover {
      color: #fff;
    }

    .nav-menu a:hover::after {
      width: 100%;
    }

    .cart-icon {
      position: relative;
      font-size: 1.5rem;
      color: #d4af37;
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #d4af37;
      color: #0d0d0d;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* Checkout Container */
    .checkout-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .checkout-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .checkout-title {
      font-family: "Playfair Display", serif;
      font-size: 2.5rem;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .checkout-subtitle {
      font-size: 1.1rem;
      color: #ccc;
    }

    /* Checkout Content */
    .checkout-content {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 40px;
    }

    /* Checkout Form */
    .checkout-form {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .form-section {
      margin-bottom: 30px;
    }

    .form-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-family: "Playfair Display", serif;
      font-size: 1.5rem;
      color: #d4af37;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      font-size: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #f5f5f5;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #444;
      padding: 15px;
      border-radius: 8px;
      color: #f5f5f5;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Payment Methods */
    .payment-methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .payment-method {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .payment-method:hover,
    .payment-method.selected {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.1);
    }

    .payment-method i {
      font-size: 2rem;
      color: #d4af37;
      margin-bottom: 10px;
    }

    .payment-method span {
      font-weight: 600;
      color: #f5f5f5;
    }

    /* Order Summary */
    .order-summary {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      height: fit-content;
      position: sticky;
      top: 120px;
    }

    .summary-title {
      font-family: "Playfair Display", serif;
      font-size: 1.8rem;
      color: #d4af37;
      margin-bottom: 25px;
      text-align: center;
    }

    .summary-items {
      margin-bottom: 20px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .summary-item:last-child {
      border-bottom: none;
    }

    .item-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .item-image {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item-details h4 {
      font-size: 0.9rem;
      color: #f5f5f5;
      margin-bottom: 2px;
    }

    .item-details p {
      font-size: 0.8rem;
      color: #ccc;
    }

    .summary-totals {
      border-top: 1px solid #333;
      padding-top: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #ccc;
    }

    .summary-row.total {
      font-weight: 700;
      font-size: 1.1rem;
      color: #d4af37;
      border-top: 1px solid #444;
      padding-top: 15px;
      margin-top: 15px;
    }

    .place-order-btn {
      width: 100%;
      background: linear-gradient(45deg, #d4af37, #b8860b);
      color: #0d0d0d;
      padding: 18px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      margin-top: 20px;
      transition: all 0.3s ease;
    }

    .place-order-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
      transform: translateY(-2px);
    }

    .place-order-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .back-to-cart {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #d4af37;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .back-to-cart:hover {
      color: #fff;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .checkout-content {
        grid-template-columns: 1fr;
        gap: 30px;
      }

      .order-summary {
        position: static;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .payment-methods {
        grid-template-columns: 1fr;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .checkout-container {
      animation: fadeIn 0.8s ease-out;
    }
  </style>
</head>

<body>
  <header id="main-header">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Dialcraft Watches">
    </a>
    <nav class="nav-menu">
      <a href="index.html">Home</a>
      <a href="all-watches.html">Collection</a>
      <a href="about.html">About</a>
      <a href="support.html">Support</a>
      <a href="account.html">Account</a>
    </nav>
  </header>

  <div class="checkout-container">
    <div class="checkout-header">
      <h1 class="checkout-title">Checkout</h1>
      <p class="checkout-subtitle">Complete your luxury watch purchase</p>
    </div>

    <div class="checkout-content">
      <form class="checkout-form" id="checkout-form">
        <!-- Contact Information -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-user"></i>
            Contact Information
          </h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" class="form-input" id="first-name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-input" id="last-name" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" id="phone" required>
          </div>
        </div>

        <!-- Shipping Address -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-truck"></i>
            Shipping Address
          </h3>
          <div class="form-group">
            <label class="form-label">Street Address</label>
            <input type="text" class="form-input" id="street-address" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">City</label>
              <input type="text" class="form-input" id="city" required>
            </div>
            <div class="form-group">
              <label class="form-label">ZIP Code</label>
              <input type="text" class="form-input" id="zip-code" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Country</label>
            <select class="form-select" id="country" required>
              <option value="">Select Country</option>
              <option value="bangladesh">Bangladesh</option>
              <option value="india">India</option>
              <option value="pakistan">Pakistan</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-credit-card"></i>
            Payment Method
          </h3>
          <div class="payment-methods">
            <div class="payment-method" data-method="bkash">
              <i class="fas fa-mobile-alt"></i>
              <span>bKash</span>
            </div>
            <div class="payment-method" data-method="nagad">
              <i class="fas fa-mobile-alt"></i>
              <span>Nagad</span>
            </div>
            <div class="payment-method" data-method="card">
              <i class="fas fa-credit-card"></i>
              <span>Credit Card</span>
            </div>
            <div class="payment-method" data-method="cod">
              <i class="fas fa-hand-holding-usd"></i>
              <span>Cash on Delivery</span>
            </div>
          </div>
        </div>

        <!-- Order Notes -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-sticky-note"></i>
            Order Notes (Optional)
          </h3>
          <div class="form-group">
            <textarea class="form-textarea" id="order-notes"
              placeholder="Any special instructions for your order..."></textarea>
          </div>
        </div>
      </form>

      <div class="order-summary" id="order-summary">
        <!-- Order summary will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    let selectedPaymentMethod = null;
    let cartTotal = 0;
    let shippingCost = 0;
    let currentDiscount = 0;

    document.addEventListener('DOMContentLoaded', () => {
      checkLoginState();
      loadOrderSummary();
      setupPaymentMethods();
      setupFormValidation();
      validateForm();
    });

    function checkLoginState() {
      let user = null;
      const currentUserId = localStorage.getItem('current_user_id');
      if (currentUserId) {
          const users = JSON.parse(localStorage.getItem('dialcraft_users')) || [];
          user = users.find(u => u.id === currentUserId);
      }
      
      if (!user) {
          user = JSON.parse(localStorage.getItem('dialcraft_user'));
      }

      if (user) {
        if (user.name) {
          const names = user.name.split(' ');
          document.getElementById('first-name').value = names[0] || '';
          document.getElementById('last-name').value = names.slice(1).join(' ') || '';
        }
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';
        
        // Auto-fill address if available (assuming user object structure)
        if (user.address) {
           document.getElementById('street-address').value = user.address.street || '';
           document.getElementById('city').value = user.address.city || '';
           document.getElementById('zip-code').value = user.address.zip || '';
           document.getElementById('country').value = user.address.country || '';
        }
      }
    }

    function calculateTotal(cart) {
      return cart.reduce((total, item) => {
        const price = parseFloat(item.price.replace(/[^\d.]/g, ''));
        const quantity = item.quantity || 1;
        return total + (price * quantity);
      }, 0);
    }

    function loadOrderSummary() {
      const cart = JSON.parse(localStorage.getItem('dialcraft_cart')) || [];

      if (cart.length === 0) {
        window.location.href = 'cart.html';
        return;
      }

      const summary = document.getElementById('order-summary');
      const subtotal = calculateTotal(cart);
      cartTotal = subtotal;
      shippingCost = subtotal > 5000 ? 0 : 200;
      
      // Inject HTML Structure
      let html = `
        <h2 class="summary-title">Order Summary</h2>
        <div class="summary-items">
      `;
      
      cart.forEach(item => {
          html += `
            <div class="summary-item">
                <div class="item-info">
                    <img src="${item.img || item.image}" alt="${item.title}" class="item-image">
                    <div class="item-details">
                        <h4>${item.title}</h4>
                        <p>Qty: ${item.quantity || 1}</p>
                    </div>
                </div>
                <span>${item.price}</span>
            </div>
          `;
      });
      
      html += `
        </div>
        <div class="summary-totals">
            <div class="summary-row">
                <span>Subtotal</span>
                <span>৳${subtotal.toLocaleString()}</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>${shippingCost === 0 ? 'Free' : '৳' + shippingCost}</span>
            </div>
            <div class="summary-row" id="discount-row" style="display: none;">
                <span>Discount</span>
                <span class="text-gold">-৳0</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="final-total">৳${(subtotal + shippingCost).toLocaleString()}</span>
            </div>
        </div>

        <!-- Coupon Section -->
        <div class="coupon-section" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <div class="flex gap-2" style="display: flex; gap: 10px;">
                <input type="text" id="coupon-code" placeholder="Coupon Code" class="form-input" style="padding: 10px;">
                <button type="button" onclick="applyCoupon()" class="btn-gold" style="background: #d4af37; color: black; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; border-radius: 4px;">Apply</button>
            </div>
            <p id="coupon-message" style="font-size: 0.8rem; margin-top: 5px;"></p>
        </div>

        <button type="button" class="place-order-btn" id="place-order-btn" onclick="placeOrder()">
            Place Order
        </button>
        <a href="cart.html" class="back-to-cart">Back to Cart</a>
      `;
      
      summary.innerHTML = html;
      
      // Check for active discount
      const activeDiscount = JSON.parse(localStorage.getItem('dialcraft_active_discount'));
      if (activeDiscount) {
          currentDiscount = (subtotal * activeDiscount.percent) / 100;
          document.getElementById('coupon-code').value = activeDiscount.code;
      }

      updateTotalsDisplay();
      validateForm();
    }

    function updateTotalsDisplay() {
        const total = cartTotal + shippingCost - currentDiscount;
        document.getElementById('final-total').innerText = '৳' + total.toLocaleString();
        
        const discountRow = document.getElementById('discount-row');
        if (currentDiscount > 0) {
            discountRow.style.display = 'flex';
            discountRow.children[1].innerText = '-৳' + currentDiscount.toLocaleString();
        } else {
            discountRow.style.display = 'none';
        }
    }

    function applyCoupon() {
        const codeInput = document.getElementById('coupon-code');
        const code = codeInput.value.trim().toUpperCase();
        const msg = document.getElementById('coupon-message');
        
        if (!code) {
            msg.innerText = 'Please enter a code.';
            msg.style.color = 'red';
            return;
        }

        // Check global coupons (mock logic or from localStorage)
        const user = JSON.parse(localStorage.getItem('dialcraft_user'));
        let validCoupon = null;

        // Check user's personal coupons first
        if (user && user.coupons) {
            validCoupon = user.coupons.find(c => c.code === code && !c.used && c.status === 'active');
        }

        // Fallback to generic codes
        if (!validCoupon) {
            const genericCoupons = [
                { code: 'DIAL10', percent: 10 },
                { code: 'WELCOME5', percent: 5 }
            ];
            validCoupon = genericCoupons.find(c => c.code === code);
        }

        if (validCoupon) {
            currentDiscount = (cartTotal * (validCoupon.percent || 0)) / 100;
            localStorage.setItem('dialcraft_active_discount', JSON.stringify(validCoupon));
            msg.innerText = `Coupon Applied! ${validCoupon.percent}% Off`;
            msg.style.color = '#4ade80';
            updateTotalsDisplay();
        } else {
            msg.innerText = 'Invalid or expired coupon.';
            msg.style.color = 'red';
            currentDiscount = 0;
            localStorage.removeItem('dialcraft_active_discount');
            updateTotalsDisplay();
        }
    }

    function selectPaymentMethod(method) {
      const methods = document.querySelectorAll('.payment-method');
      methods.forEach(m => m.classList.remove('selected'));
      method.classList.add('selected');
      selectedPaymentMethod = method.dataset.method;
      
      const existingDetails = document.querySelector('.payment-details-input');
      if (existingDetails) existingDetails.remove();

      if (selectedPaymentMethod === 'bkash' || selectedPaymentMethod === 'nagad') {
          const detailsHtml = `
            <div class="form-group payment-details-input full-width" style="margin-top: 15px; animation: fadeIn 0.5s;">
                <label class="form-label">${selectedPaymentMethod === 'bkash' ? 'bKash' : 'Nagad'} Number</label>
                <input type="tel" class="form-input" id="mobile-wallet-number" placeholder="01XXXXXXXXX" required>
                <label class="form-label" style="margin-top: 10px;">Transaction ID (Optional)</label>
                <input type="text" class="form-input" id="trx-id" placeholder="Enter TrxID">
            </div>
          `;
          method.parentElement.insertAdjacentHTML('afterend', detailsHtml);
          const walletInput = document.getElementById('mobile-wallet-number');
          const trxInput = document.getElementById('trx-id');
          if (walletInput) {
            walletInput.addEventListener('input', validateForm);
            walletInput.addEventListener('change', validateForm);
          }
          if (trxInput) {
            trxInput.addEventListener('input', validateForm);
            trxInput.addEventListener('change', validateForm);
          }
      }

      validateForm();
    }

    function setupPaymentMethods() {
      // Load payment settings
      const settings = JSON.parse(localStorage.getItem('dialcraft_settings')) || { payments: { cod: true, bkash: true, nagad: true, card: true } };
      const pay = settings.payments || { cod: true, bkash: true, nagad: true, card: true };

      // Hide disabled methods
      const methods = document.querySelectorAll('.payment-method');
      methods.forEach(method => {
        const type = method.dataset.method;
        if (!pay[type]) {
            method.style.display = 'none';
        }

        method.addEventListener('click', () => {
          selectPaymentMethod(method);
        });
      });
      const firstAvailable = Array.from(methods).find(m => m.style.display !== 'none');
      if (!selectedPaymentMethod && firstAvailable) {
        selectPaymentMethod(firstAvailable);
      }
    }

    function setupFormValidation() {
      const form = document.getElementById('checkout-form');
      if (form) {
        form.addEventListener('input', validateForm);
        form.addEventListener('change', validateForm);
      }
      const inputs = document.querySelectorAll('.form-input, .form-select');
      inputs.forEach(input => {
        input.addEventListener('input', validateForm);
        input.addEventListener('change', validateForm);
      });
    }

    function validateForm() {
      const requiredIds = ['first-name', 'last-name', 'email', 'phone', 'street-address', 'city', 'zip-code', 'country'];
      let isValid = true;

      requiredIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) isValid = false;
      });

      if (!selectedPaymentMethod) isValid = false;
      
      // Specific validation for mobile banking
      if (selectedPaymentMethod === 'bkash' || selectedPaymentMethod === 'nagad') {
          const walletNum = document.getElementById('mobile-wallet-number');
          if (!walletNum || !walletNum.value.trim()) isValid = false;
      }

      const btn = document.getElementById('place-order-btn');
      btn.disabled = !isValid;
      return isValid;
    }

    function getPaymentSnapshot() {
      const walletNumber = document.getElementById('mobile-wallet-number')?.value || '';
      return {
        method: selectedPaymentMethod,
        walletLast4: walletNumber ? walletNumber.slice(-4) : '',
        trxId: document.getElementById('trx-id')?.value || ''
      };
    }

    function upsertUserFromCheckout() {
      const email = document.getElementById('email').value.trim();
      const users = JSON.parse(localStorage.getItem('dialcraft_users')) || [];
      const currentUserId = localStorage.getItem('current_user_id');
      let user = null;

      if (currentUserId) {
        user = users.find(u => u.id === currentUserId) || null;
      }

      if (!user && email) {
        user = users.find(u => u.email === email) || null;
      }

      if (!user) {
        const localUser = JSON.parse(localStorage.getItem('dialcraft_user'));
        if (localUser && (!email || localUser.email === email)) {
          user = localUser;
        }
      }

      const baseUser = {
        name: `${document.getElementById('first-name').value} ${document.getElementById('last-name').value}`.trim(),
        email: email,
        phone: document.getElementById('phone').value,
        tier: 'Standard',
        address: {
          street: document.getElementById('street-address').value,
          city: document.getElementById('city').value,
          zip: document.getElementById('zip-code').value,
          country: document.getElementById('country').value
        },
        lastPayment: getPaymentSnapshot()
      };

      const mergedUser = {
        ...user,
        ...baseUser,
        id: user && user.id ? user.id : `user_${Date.now()}`,
        tier: user && user.tier ? user.tier : baseUser.tier
      };

      const existingIndex = users.findIndex(u => u.id === mergedUser.id);
      if (existingIndex > -1) {
        users[existingIndex] = mergedUser;
      } else {
        users.push(mergedUser);
      }

      localStorage.setItem('dialcraft_users', JSON.stringify(users));
      localStorage.setItem('dialcraft_user', JSON.stringify(mergedUser));
      localStorage.setItem('current_user_id', mergedUser.id);
      return mergedUser;
    }

    function placeOrder() {
      if (!validateForm()) return;

      const btn = document.getElementById('place-order-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
      btn.disabled = true;

      setTimeout(() => {
          // Collect Order Data
          const cart = JSON.parse(localStorage.getItem('dialcraft_cart')) || [];
          
          const user = upsertUserFromCheckout();
          
          const order = {
              id: 'ORD-' + Date.now(),
              date: new Date().toISOString(),
              userId: user.id,
              items: cart,
              shipping: {
                  firstName: document.getElementById('first-name').value,
                  lastName: document.getElementById('last-name').value,
                  email: document.getElementById('email').value,
                  phone: document.getElementById('phone').value,
                  address: document.getElementById('street-address').value,
                  city: document.getElementById('city').value,
                  zip: document.getElementById('zip-code').value,
                  country: document.getElementById('country').value,
              },
              payment: {
                  ...getPaymentSnapshot()
              },
              notes: document.getElementById('order-notes').value,
              totals: {
                  subtotal: cartTotal,
                  shipping: shippingCost,
                  discount: currentDiscount,
                  total: cartTotal + shippingCost - currentDiscount
              },
              status: 'Processing'
          };

          // Save Order
          let orders = JSON.parse(localStorage.getItem('dialcraft_orders')) || [];
          orders.push(order);
          localStorage.setItem('dialcraft_orders', JSON.stringify(orders));

          // Mark coupon as used if personal
          const activeDiscount = JSON.parse(localStorage.getItem('dialcraft_active_discount'));
          if (activeDiscount && user.coupons) {
              const couponIdx = user.coupons.findIndex(c => c.code === activeDiscount.code);
              if (couponIdx > -1) {
                  user.coupons[couponIdx].used = true;
                  localStorage.setItem('dialcraft_user', JSON.stringify(user));
                  // Update global users list too
                  let users = JSON.parse(localStorage.getItem('dialcraft_users')) || [];
                  const uIdx = users.findIndex(u => u.id === user.id);
                  if (uIdx > -1) {
                      users[uIdx] = user;
                      localStorage.setItem('dialcraft_users', JSON.stringify(users));
                  }
              }
          }

          // Clear Cart
          localStorage.removeItem('dialcraft_cart');
          localStorage.removeItem('dialcraft_active_discount');

          // Redirect
          window.location.href = 'order-confirmation.html?id=' + order.id;
      }, 2000);
    }
  </script>
  <script src="lucky-spin.js"></script>
</body>
